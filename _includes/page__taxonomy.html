{% if page.tags[0] %}
  <div class="page__taxonomy">
    <strong>Tags: </strong>
    <span itemprop="keywords">
      {% for tag in page.tags %}
        <span class="tag-pill" style="display: inline-block; padding: 2px 8px; margin: 2px; background: #e8e8e8; border-radius: 3px; font-size: 0.8em;">{{ tag }}</span>
      {% endfor %}
    </span>
  </div>
{% endif %}
